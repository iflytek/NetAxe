global:
  scrape_interval: 30s
  scrape_timeout: 10s

scrape_configs:
  - job_name: 'vmagent'
    static_configs:
      - targets: ['vmagent:8429']
  - job_name: 'vmalert'
    static_configs:
      - targets: ['vmalert:8880']
  - job_name: 'vmauth'
    static_configs:
      - targets: ['vmauth:8427']
  - job_name: 'vminsert'
    static_configs:
      - targets: ['vminsert-1:8480', 'vminsert-2:8480', 'vminsert-3:8480']
  - job_name: 'vmselect'
    static_configs:
      - targets: ['vmselect-1:8481', 'vmselect-2:8481', 'vmselect-3:8481']
  - job_name: 'vmstorage'
    static_configs:
      - targets: ['vmstorage-1:8482', 'vmstorage-2:8482', 'vmstorage-3:8482']
  - job_name: 'snmp-exporter'
    static_configs:
      - targets: ['snmp-exporter:9116']
  - job_name: 'blackbox-exporter'
    static_configs:
      - targets: ['blackbox-exporter:9115']

  - job_name: 'icmp_connect_15s'
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [icmp]
    http_sd_configs:
      - url: http://register:4168/regis/services
        basic_auth:
          username: admin
          password: REGIS_PASSWORD
    relabel_configs:
    - source_labels: ['__address__']
      target_label: __param_target
    - source_labels: ['__address__']
      target_label: instance
    - target_label: __address__
      replacement: blackbox-exporter:9115
    - source_labels: [env]
      regex: .*icmp_15s.*
      action: keep

  - job_name: 'tcp_connect_15s'
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [tcp_connect]
    http_sd_configs:
      - url: http://register:4168/regis/services
        basic_auth:
          username: admin
          password: REGIS_PASSWORD
    relabel_configs:
    - source_labels: ['__address__','port']
      target_label: __param_target
      regex: "(.*);(.*)"
      replacement: "$1:$2"
      action: replace
    - source_labels: ['__address__','port']
      target_label: instance
      regex: "(.*);(.*)"
      replacement: "$1:$2"
      action: replace
    - target_label: __address__
      replacement: blackbox-exporter:9115
    - source_labels: [env]
      regex: .*tcp_connect_15s.*
      action: keep

  - job_name: 'tcp_connect_all'
    scrape_interval: 1m
    metrics_path: /probe
    params:
      module: [tcp_connect]
    http_sd_configs:
      - url: http://register:4168/regis/services
        basic_auth:
          username: admin
          password: REGIS_PASSWORD
    relabel_configs:
    - source_labels: ['__address__','port']
      target_label: __param_target
      regex: "(.*);(.*)"
      replacement: "$1:$2"
      action: replace
    - source_labels: ['__address__','port']
      target_label: instance
      regex: "(.*);(.*)"
      replacement: "$1:$2"
      action: replace
    - target_label: __address__
      replacement: blackbox-exporter:9115
    - source_labels: [env]
      regex: .*tcp_connect_all.*
      action: keep

  - job_name: "h3c_devices"
    scrape_interval: 60s
    scrape_timeout: 50s
    file_sd_configs:
      - files:
        - /etc/prometheus/targets/device.yml
        refresh_interval: 2m
    metrics_path: /snmp
    relabel_configs:
    - source_labels: ["__address__"]
      target_label: __param_target
    - source_labels: ["__param_target"]
      target_label: instance
    - target_label: __address__
      replacement: snmp-exporter:9116
    - source_labels: ["module"]
      target_label: __param_module
    - source_labels: ["auth"]
      target_label: __param_auth
    metric_relabel_configs:
    - source_labels: [ip1, ip2, ip3, ip4]  # 提取ip地址的四个部分
      separator: '.'
      target_label: 'index'

    - source_labels: [ifName, ifAlias]
      separator: '【'
      regex: '(.*)'
      target_label: 'interface'
      replacement: '${1}】'
