  rules:
  - alert: A2电信线路1流量超600M预警
    expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21',
      ifName='Ten-GigabitEthernet1/0/9'}[5m]), "direction", "入方向", "", ""), 0.000008
      * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/9'}[5m]),
      "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName)
      sysName > 600
