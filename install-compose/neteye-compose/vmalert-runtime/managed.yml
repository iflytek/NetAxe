---
groups:
- name: blackbox-public-meta
  interval: 30s
  rules:
  - alert: PublicTcpMonitorDataStale
    expr: count(count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[10m])))
      < 9
    for: 5m0s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网探测告警
      environment: public
      severity: critical
    annotations:
      description: 公网TCP当前上报数据的探测点数少于9个，可能存在探测点、remote write 或 VictoriaMetrics 写入异常。
      runbook_url: https://your-wiki/runbook/monitor-data-stale-public
      summary: 公网TCP探测点数据缺失
  - alert: PublicIcmpMonitorDataStale
    expr: count(count by (monitor) (last_over_time(probe_success{job="icmp_connect_15s"}[10m])))
      < 9
    for: 5m0s
    labels:
      alert_channel: public_icmp
      alertgroup: 公网探测告警
      environment: public
      severity: critical
    annotations:
      description: 公网ICMP当前上报数据的探测点数少于9个，可能存在探测点、remote write 或 VictoriaMetrics 写入异常。
      runbook_url: https://your-wiki/runbook/monitor-data-stale-public
      summary: 公网ICMP探测点数据缺失
- name: blackbox-public-service
  interval: 15s
  rules:
  - alert: TcpInstanceDown
    expr: count by (instance, job, port, idc, type, code) (max_over_time(probe_success{job="tcp_connect_15s"}[2m])
      == 0) >= 3
    for: 30s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: page
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}，状态码={{ $labels.code }}）在至少3个公网探测点连续2分钟TCP探测失败。"
      recovery_summary: 公网TCP服务恢复
      runbook_url: https://your-wiki/runbook/tcp-instance-down
      summary: 公网TCP服务不可达
  - alert: IcmpInstanceDown
    expr: count by (instance, job, port, idc, type) (max_over_time(probe_success{job="icmp_connect_15s"}[2m])
      == 0) >= 3
    for: 30s
    labels:
      alert_channel: public_icmp
      alertgroup: 公网ICMP告警
      environment: public
      severity: page
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}）在至少3个公网探测点连续2分钟ICMP探测失败。"
      recovery_summary: 公网ICMP服务恢复
      runbook_url: https://your-wiki/runbook/icmp-instance-down
      summary: 公网ICMP服务不可达
  - alert: PublicTcpServiceFlapping
    expr: count by (instance, job, port, idc, type, code) ((count by (monitor, instance,
      job, port, idc, type, code) ((changes(probe_success{job="tcp_connect_15s"}[2m])
      >= 2) and (avg_over_time(probe_success{job="tcp_connect_15s"}[2m]) <= 0.8) and
      (min_over_time(probe_success{job="tcp_connect_15s"}[2m]) == 0) and (max_over_time(probe_success{job="tcp_connect_15s"}[2m])
      == 1))) > 0) >= 3
    for: 30s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}，状态码={{ $labels.code }}）在至少3个公网探测点的最近2分钟内出现成功/失败切换且失败采样占比超过20%，存在公网TCP连通性抖动。"
      summary: 公网TCP服务抖动
  - alert: PublicIcmpServiceFlapping
    expr: count by (instance, job, port, idc, type) ((changes(probe_success{job="icmp_connect_15s"}[2m])
      >= 2) and (min_over_time(probe_success{job="icmp_connect_15s"}[2m]) == 0) and
      (max_over_time(probe_success{job="icmp_connect_15s"}[2m]) == 1)) >= 3
    for: 30s
    labels:
      alert_channel: public_icmp
      alertgroup: 公网ICMP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}）在至少3个公网探测点的最近2分钟内出现2次及以上成功/失败切换，存在公网ICMP连通性抖动。"
      summary: 公网ICMP服务抖动
  - alert: PublicTcpServiceDegradationDetected
    expr: count by (instance, job, port, idc, type, code) ((avg_over_time(probe_success{job="tcp_connect_15s"}[5m])
      < 0.95) and (max_over_time(probe_success{job="tcp_connect_15s"}[2m]) == 1))
      >= 3
    for: 1m0s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}，状态码={{ $labels.code }}）在至少3个公网探测点的最近5分钟TCP探测成功率低于95%。"
      summary: 公网TCP服务成功率下降
  - alert: PublicIcmpServiceDegradationDetected
    expr: count by (instance, job, port, idc, type) ((avg_over_time(probe_success{job="icmp_connect_15s"}[5m])
      < 0.95) and (max_over_time(probe_success{job="icmp_connect_15s"}[2m]) == 1))
      >= 3
    for: 1m0s
    labels:
      alert_channel: public_icmp
      alertgroup: 公网ICMP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务机房={{ $labels.idc }}，资源类型={{ $labels.type
        }}，端口={{ $labels.port }}）在至少3个公网探测点的最近5分钟ICMP探测成功率低于95%。"
      summary: 公网ICMP服务成功率下降
- name: blackbox-public-egress
  interval: 30s
  rules:
  - alert: IDC_Egress_Failure_Rate_High
    expr: |
      count(count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[10m]))) >= 7
      and
      (
        sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]) == bool 0)
        /
        count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]))
      ) > 0.12
    for: 1m0s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: critical
    annotations:
      description: "{{ $labels.monitor }} 公网TCP探测失败率超过12%。"
      runbook_url: https://your-wiki/runbook/idc-egress-failure-rate
      summary: 公网数据中心出口异常
  - alert: IDC_Egress_Failure_Spike
    expr: |
      count(count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[10m]))) >= 7
      and
      (
        (
          sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]) == bool 0)
          -
          sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m] offset 5m) == bool 0)
        ) > 30
      )
      and
      (
        sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]) == bool 0)
        >
        sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m] offset 5m) == bool 0) * 1.5
      )
    for: 1m0s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.monitor }} 公网TCP探测失败数较5分钟前明显增加。"
      summary: 公网数据中心出口波动
  - alert: IDC_Egress_Outlier
    expr: |
      count(count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[10m]))) >= 7
      and
      (
        sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]) == bool 0)
        /
        count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]))
      )
      >
      avg(
        sum by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]) == bool 0)
        /
        count by (monitor) (last_over_time(probe_success{job="tcp_connect_15s"}[2m]))
      ) * 3
    for: 1m0s
    labels:
      alert_channel: public_tcp
      alertgroup: 公网TCP告警
      environment: public
      severity: warning
    annotations:
      description: "{{ $labels.monitor }} 公网TCP探测失败率显著高于其他公网数据中心。"
      summary: 公网数据中心出口异常（对比）
- name: blackbox-lan-meta
  interval: 30s
  rules:
  - alert: LanTcpMonitorDataStale
    expr: count(count by (monitor) (last_over_time(probe_success{job="tcp_lan_15s"}[10m])))
      < 5
    for: 5m0s
    labels:
      alert_channel: internal_tcp
      alertgroup: 内网探测告警
      environment: internal
      severity: critical
    annotations:
      description: 内网TCP当前上报数据的探测点数少于5个，可能存在探测点、remote write 或 VictoriaMetrics 写入异常。
      runbook_url: https://your-wiki/runbook/monitor-data-stale-internal
      summary: 内网TCP探测点数据缺失
  - alert: LanIcmpMonitorDataStale
    expr: count(count by (monitor) (last_over_time(probe_success{job="icmp_lan_15s"}[10m])))
      < 5
    for: 5m0s
    labels:
      alert_channel: internal_icmp
      alertgroup: 内网探测告警
      environment: internal
      severity: critical
    annotations:
      description: 内网ICMP当前上报数据的探测点数少于5个，可能存在探测点、remote write 或 VictoriaMetrics 写入异常。
      runbook_url: https://your-wiki/runbook/monitor-data-stale-internal
      summary: 内网ICMP探测点数据缺失
- name: blackbox-lan-service
  interval: 15s
  rules:
  - alert: LanTcpInstanceDown
    expr: count by (instance, job, port, bgbu, user) (max_over_time(probe_success{job="tcp_lan_15s"}[2m])
      == 0) >= 2
    for: 30s
    labels:
      alert_channel: internal_tcp
      alertgroup: 内网TCP告警
      environment: internal
      severity: page
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}，端口={{ $labels.port }}）在至少2个内网探测点连续2分钟TCP探测失败。"
      recovery_summary: 内网TCP服务恢复
      runbook_url: https://your-wiki/runbook/lan-tcp-instance-down
      summary: 内网TCP服务不可达
  - alert: LanIcmpInstanceDown
    expr: count by (instance, job, bgbu, user) (max_over_time(probe_success{job="icmp_lan_15s"}[2m])
      == 0) >= 2
    for: 30s
    labels:
      alert_channel: internal_icmp
      alertgroup: 内网ICMP告警
      environment: internal
      severity: page
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}）在至少2个内网探测点连续2分钟ICMP探测失败。"
      recovery_summary: 内网ICMP服务恢复
      runbook_url: https://your-wiki/runbook/lan-icmp-instance-down
      summary: 内网ICMP服务不可达
  - alert: LanTcpServiceFlapping
    expr: count by (instance, job, port, bgbu, user) ((count by (monitor, instance,
      job, port, bgbu, user) ((changes(probe_success{job="tcp_lan_15s",proxy_node!="prometheus-tcp"}[2m])
      >= 2) and (avg_over_time(probe_success{job="tcp_lan_15s",proxy_node!="prometheus-tcp"}[2m])
      <= 0.8) and (min_over_time(probe_success{job="tcp_lan_15s",proxy_node!="prometheus-tcp"}[2m])
      == 0) and (max_over_time(probe_success{job="tcp_lan_15s",proxy_node!="prometheus-tcp"}[2m])
      == 1))) > 0) >= 2
    for: 30s
    labels:
      alert_channel: internal_tcp
      alertgroup: 内网TCP告警
      environment: internal
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}，端口={{ $labels.port }}）在至少2个内网探测点的最近2分钟内出现成功/失败切换且失败采样占比超过20%，存在内网TCP连通性抖动。"
      summary: 内网TCP服务抖动
  - alert: LanIcmpServiceFlapping
    expr: count by (instance, job, bgbu, user) ((changes(probe_success{job="icmp_lan_15s"}[2m])
      >= 2) and (min_over_time(probe_success{job="icmp_lan_15s"}[2m]) == 0) and (max_over_time(probe_success{job="icmp_lan_15s"}[2m])
      == 1)) >= 2
    for: 30s
    labels:
      alert_channel: internal_icmp
      alertgroup: 内网ICMP告警
      environment: internal
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}）在至少2个内网探测点的最近2分钟内出现2次及以上成功/失败切换，存在内网ICMP连通性抖动。"
      summary: 内网ICMP服务抖动
  - alert: LanTcpServiceDegradationDetected
    expr: count by (instance, job, port, bgbu, user) ((avg_over_time(probe_success{job="tcp_lan_15s"}[5m])
      < 0.95) and (max_over_time(probe_success{job="tcp_lan_15s"}[2m]) == 1)) >= 2
    for: 1m0s
    labels:
      alert_channel: internal_tcp
      alertgroup: 内网TCP告警
      environment: internal
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}，端口={{ $labels.port }}）在至少2个内网探测点的最近5分钟TCP探测成功率低于95%。"
      summary: 内网TCP服务成功率下降
  - alert: LanIcmpServiceDegradationDetected
    expr: count by (instance, job, bgbu, user) ((avg_over_time(probe_success{job="icmp_lan_15s"}[5m])
      < 0.95) and (max_over_time(probe_success{job="icmp_lan_15s"}[2m]) == 1)) >=
      2
    for: 1m0s
    labels:
      alert_channel: internal_icmp
      alertgroup: 内网ICMP告警
      environment: internal
      severity: warning
    annotations:
      description: "{{ $labels.instance }}（业务={{ $labels.bgbu }}，负责人={{ $labels.user
        }}）在至少2个内网探测点的最近5分钟ICMP探测成功率低于95%。"
      summary: 内网ICMP服务成功率下降
- name: vmagent-monitor-point
  interval: 30s
  rules:
  - alert: VmagentMonitorPointDown
    expr: max by (monitor, proxy_node) (max_over_time(up{job="vmagent", proxy_node!=""}[5m]))
      == 0
    for: 2m0s
    labels:
      alert_channel: vmagent_status
      alertgroup: 监控点组件告警
      environment: monitor-point
      severity: critical
    annotations:
      description: "{{ $labels.monitor }} / {{ $labels.proxy_node }} 的 vmagent 最近5分钟没有任何一次成功抓取，并且该状态已持续2分钟。请检查监控点
        vmagent 进程、/metrics 监听地址、网络连通性和本地 blackbox 抓取压力。"
      recovery_summary: 监控点 vmagent 恢复
      runbook_url: https://your-wiki/runbook/vmagent-monitor-point-down
      summary: 监控点 vmagent 持续不可达
  - alert: VmagentMonitorPointNoData
    expr: |
      absent_over_time(up{job="vmagent", monitor="beijing-dazu", proxy_node="vmagent-beijing-dazu-public"}[5m])
      or absent_over_time(up{job="vmagent", monitor="beijing-dazu", proxy_node="vmagent-beijing-dazu-internal-0"}[5m])
      or absent_over_time(up{job="vmagent", monitor="beijing-dazu", proxy_node="vmagent-beijing-dazu-internal-1"}[5m])
      or absent_over_time(up{job="vmagent", monitor="beijing-dazu", proxy_node="vmagent-beijing-dazu-internal-2"}[5m])
    for: 2m0s
    labels:
      alert_channel: vmagent_status
      alertgroup: 监控点组件告警
      environment: monitor-point
      severity: critical
    annotations:
      description: "{{ $labels.monitor }} / {{ $labels.proxy_node }} 的 vmagent 最近5分钟没有上报自监控数据，并且该状态已持续2分钟。请检查该
        shard 进程、监听地址、remote write 和本地 blackbox 抓取压力。"
      recovery_summary: 监控点 vmagent 数据恢复
      runbook_url: https://your-wiki/runbook/vmagent-monitor-point-no-data
      summary: 监控点 vmagent 数据中断
- name: DNS告警
  rules:
  - alert: DNS解析异常
    expr: probe_dns_answer_rrs{domain!="who.are.you",job=~"dns.*.probe"} == 0
    for: 1m
    labels:
      id: 156
      type: DNS解析异常
      time_range: 24
      severity: 紧急
      time_stamp: current_time_seconds
    annotations:
      summary: "{{ $labels.instance}}拨测点，{{ $labels.domain }}域名解析失败，解析DNS为{{ $labels.dns
        }}"
      description: "{{ $labels.instance}}拨测点，{{ $labels.domain }}域名解析失败，解析DNS为{{ $labels.dns
        }}"
  - alert: 监控组件异常
    expr: up{job="dns_process_exporter"} == 0
    for: 2m
    labels:
      id: 118
      type: 监控组件异常
      time_range: 12
      severity: 重要
    annotations:
      summary: test
      description: "{{ $labels.job }}|{{ $labels.instance }}|组件:{{ $labels.exporter_name
        }}|Down"
  - alert: 主机分区使用量超过阈值
    expr: round((1-node_filesystem_avail_bytes{device=~"/dev/.*",job=~'.*'}/node_filesystem_size_bytes{device=~"/dev/.*",job=~'.*'})*100)
      > 80
    for: 2m
    labels:
      id: 104
      type: 主机分区使用量超过阈值
      time_range: 24
      severity: 紧急
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|{{ $labels.device }} on {{
        $labels.mountpoint }}容量:{{ $value }}% > 80%"
      description: 联系值班人
      value: "{{ $value }}"
  - alert: 主机bond0网络接收流量超过阈值
    expr: round(irate(node_network_receive_bytes_total{device='bond0',job=~'.*'}[3m])/1024/1024)
      > 1250
    for: 5m
    labels:
      id: 110
      type: 网卡流量较大
      time_range: 12
      severity: 重要
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|{{ $labels.device }}接收流量{{
        $value }}MB/s"
      description: 联系值班人
  - alert: 主机bond0网络发送流量超过阈值
    expr: round(irate(node_network_transmit_bytes_total{device='bond0',job=~'.*'}[3m])/1024/1024)
      > 1250
    for: 5m
    labels:
      id: 110
      type: 网卡流量较大
      time_range: 12
      severity: 重要
    annotations:
      summary: "{{ $labels.job }}||{{ $labels.instance }}|{{ $labels.device }}发送流量{{
        $value }}MB/s"
      description: 联系值班人
  - alert: 主机CPU负载较高
    expr: 100 - round((avg by (instance,job) (irate(node_cpu_seconds_total{ mode="idle"}[5m]))
      * 100)) > 50
    for: 5m
    labels:
      id: 114
      type: CPU负载较高
      time_range: 12
      severity: 重要
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|负载量:{{ $value }}%>50%"
      description: 联系值班人
  - alert: 主机内存超过阈值
    expr: round((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes
      * 100) > 50
    for: 2m
    labels:
      id: 115
      type: 内存超阈值
      time_range: 12
      severity: 重要
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|内存:{{ $value }}%>50%"
      description: 联系值班人
  - alert: 主机网卡bond0异常
    expr: node_bonding_active{job=~'.*'} < 2
    for: 3m
    labels:
      id: 117
      type: 网卡状态异常
      time_range: 24
      severity: 紧急
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|{{ $labels.master }}异常"
      description: 联系值班人
  - alert: 主机运行时间异常
    expr: time()-node_boot_time_seconds{job=~'.*'} < 600
    labels:
      id: 128
      type: 时钟状态异常
      time_range: 24
      severity: 紧急
      sendtype: emailonly
    annotations:
      summary: "{{ $labels.job }}|{{ $labels.instance }}|Uptime<10Min"
      description: 联系值班人
- name: 设备硬件告警
  rules:
  - alert: 设备不可达
    expr: (up{env="network_monitor_snmp"} == 0 and on(instance) (up{env=~'network_monitor|network_monitor_slow'}
      == 0)) * on(instance) group_left(sysName) last_over_time(sysName[30m])
    for: 1m
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】设备SNMP不可达"
      description: 设备SNMP不可达
  - alert: vmagent节点不可达
    expr: up{job="vmagent"} == 0
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.instance}} vmagent节点不可达"
      description: vmagent节点不可达
  - alert: 启动时间异常
    expr: "(snmpEngineTime < 600   or sysUpTime < 600 )* on(instance) group_left(sysName)
      sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】主机启动时间异常"
      description: 启动时间异常
  - alert: CPU利用率高
    expr: ((avg_over_time(hh3cEntityExtCpuUsage{entPhysicalName!=""}[1m]) > 80) or   (avg_over_time(hwAvgDuty1min[1m])
      > 80) or (avg_over_time(hillstoneModuleCpuCur[1m]) > 80)     or  (avg_over_time(hwEntityCpuUsage[1m])
      > 80) or (avg_over_time(sysCPU[1m]) > 80) or (avg_over_time(CPU1[1m]) > 80)
      or (avg_over_time(CPU2[1m]) > 80)) * on(instance) group_left(sysName) sysName
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】 CPU 利用率已经超过 80%。当前值: {{
        printf "%.2f" $value }}% '
      description: CPU利用率高
  - alert: 内存利用率高
    expr: "((avg_over_time(hh3cEntityExtMemUsage[5m]) > 85) or (avg_over_time(hwEntityMemUsage[5m])
      > 85) or (avg_over_time(sysMemRatio[5m]) > 85) or ((avg_over_time(memused[5m])
      / avg_over_time(memtotal[5m])) * 100 > 85) or ((avg_over_time(skmemused[5m])
      / avg_over_time(skmemtotal[5m])) * 100 > 85)) * on(instance) group_left(sysName)
      sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】 内存利用率已经超过 85%。当前值: {{
        printf "%.2f" $value }}%'
      description: 内存利用率高
  - alert: 设备电源异常
    expr: "((hh3cDevMPowerStatus!=1 and changes_prometheus(hh3cDevMPowerStatus[5m])>0
      or hwEntityPwrState!=1 and changes_prometheus(hwEntityPwrState[5m])>0 or otherPower!=1
      and changes_prometheus(otherPower[5m])>0  or hillstonePowerState!=0 and changes_prometheus(hillstonePowerState[5m])>0))
      * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 设备电源异常"
      description: 设备电源异常
  - alert: 设备风扇异常
    expr: "((hh3cDevMFanStatus!=1 and changes_prometheus(hh3cDevMFanStatus[5m])>0
      or hwEntityFanState!=1 and changes_prometheus(hwEntityFanState[5m])>0 or otherFan!=1
      and changes_prometheus(otherFan[5m])>0 or hillstoneFanState!=0 and changes_prometheus(hillstoneFanState[5m])>0))
      * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 设备风扇异常"
      description: 设备风扇异常
  - alert: 设备温度异常
    expr: (hh3cEntityExtTemperature > 95 and max_over_time(hh3cEntityExtTemperature[5m])
      < 200 or hwEntityTemperature > 95 and max_over_time(hwEntityTemperature[5m])
      < 200 or hillstoneTemperatureValue > 95 or ruijieTemperature > 95 or sk1temp1
      > 95 or sk1temp2 > 95 or sk2temp1 > 95 or sk2temp2 > 95 or (mellanoxtemp{mellanoxlName="Temperature
      Sensor"}/10) > 95 and max_over_time((mellanoxtemp{mellanoxlName="Temperature
      Sensor"}/10)[5m]) < 100) * on(instance) group_left(sysName) sysName
    for: 5m
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 设备温度超过95°C，当前温度为{{$value}}°C"
      description: 设备温度异常
- name: 防火墙告警
  rules:
  - alert: 板卡状态变化
    expr: "(hillstoneSlotState != 5 and changes_prometheus(hillstoneSlotState[5m])
      > 0 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName }}【{{ $labels.instance }}】防火墙板卡状态变化，当前状态为{{ if
        eq (printf "%v" $value) "0" }}无效{{ else if eq (printf "%v" $value) "1" }}插槽为空{{
        else if eq (printf "%v" $value) "2" }}在位{{ else if eq (printf "%v" $value)
        "3" }}上线等待{{ else if eq (printf "%v" $value) "4" }}上线初始化完成{{ else if eq (printf
        "%v" $value) "5" }}在线{{ else if eq (printf "%v" $value) "6" }}下线等待{{ else
        if eq (printf "%v" $value) "7" }}离线{{ else if eq (printf "%v" $value) "8"
        }}失去连接{{ else if eq (printf "%v" $value) "9" }}启动{{ else if eq (printf "%v"
        $value) "10" }}加载{{ else if eq (printf "%v" $value) "11" }}错误{{ else if eq
        (printf "%v" $value) "12" }}系统不支持获取槽位状态{{ else }}unknown{{ end }}'
      description: 板卡状态变化
  - alert: HA状态变化
    expr: "(sysHAStatus != 100 and changes_prometheus(sysHAStatus[5m]) > 0 ) * on(instance)
      group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName }}【{{ $labels.instance }}】防火墙HA状态变化，当前状态为{{ if
        eq (printf "%v" $value) "0" }}独立设备{{ else if eq (printf "%v" $value) "3" }}Slave设备{{
        else if eq (printf "%v" $value) "4" }}Master设备{{ else }}unknown{{ end }}'
      description: HA状态变化
  - alert: 防火墙会话告警【并发】
    expr: "(100*sysCurSession/sysTotalSession > 80 ) * on(instance) group_left(sysName)
      sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】 防火墙会话【并发】利用率达到阈值80%，当前利用率{{
        printf "%.2f" $value }}%'
      description: 防火墙会话告警【并发】
  - alert: 防火墙会话告警【新建】
    expr: "( sysRampupRate > (avg_over_time(sysRampupRate[5m])*2) and  avg_over_time(sysRampupRate[5m])
      > 100000 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 最近5分钟会话【新建】有突发，当前值为{{
        $value }}"
      description: 防火墙会话告警【新建】
  - alert: 防火墙会话告警【新建hw】
    expr: "(hwSecConSessNum > 200000 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 会话【新建】突发超过20w，当前值为{{ $value
        }}"
      description: 防火墙会话告警【新建hw】
  - alert: 防火墙板卡利用率告警（Control Plane）
    expr: "(hillstoneModuleMemCPUseRate > 80) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】 防火墙{{ $labels.hillstoneSlotDescr}}板卡（Control
        Plane）利用率超过80%，当前利用率{{ printf "%.2f" $value }}%'
      description: 防火墙板卡利用率告警（Control Plane）
  - alert: 防火墙板卡利用率告警（Data Plane）
    expr: "(hillstoneModuleMemDPUseRate > 80) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】  防火墙{{ $labels.hillstoneSlotDescr}}板卡（Data
        Plane）利用率超过80%，当前利用率{{ printf "%.2f" $value }}%'
      description: 防火墙板卡利用率告警（Data Plane）
- name: 设备接口告警
  rules:
  - alert: 设备接口变化
    expr: (ifOperStatus != 100  and changes_prometheus(ifOperStatus[5m]) > 0)* on(instance)
      group_left(sysName) sysName{sysName!~".*(LF|AS).*"}
    for: 0s
    labels:
      severity: 紧急
      value: '{{ if eq (printf "%v" $value) "1" }}UP{{ else if eq (printf "%v" $value)
        "2" }}DOWN{{ else }}UNKNOWN{{ end }}'
    annotations:
      summary: '{{ $labels.sysName }}【{{ $labels.instance }}】主机接口{{$labels.interface}}变化，当前状态:
        {{ if eq (printf "%v" $value) "1" }}UP{{ else if eq (printf "%v" $value) "2"
        }}DOWN{{ else }}UNKNOWN{{ end }}'
      description: 设备接口变化
  - alert: 带宽利用率高
    expr: (((irate(ifHCInOctets{brand!='山石网科',ifName!~".*(NULL|InLoop|Vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])*800)/(ifHighSpeed{ifName!~".*(NULL|InLoop|Vlan|Vsi|Loo|NU|SSL).*"}*1000000)
      > 80) or ((irate(ifHCOutOctets{brand!='山石网科',ifName!~".*(NULL|InLoop|Vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])*800)/(ifHighSpeed{ifName!~".*(NULL|InLoop|Vlan|Vsi|Loo|NU|SSL).*"}*1000000)
      > 80) ) * on(instance) group_left(sysName) sysName{sysName!~".*(LF|AS).*"}
    for: 0s
    labels:
      severity: 紧急
      value: '{{ printf "%.2f" $value }}%'
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 {{ $labels.interface}}接口带宽利用率已经超过80%，接口最大带宽为{{
        $labels.ifHighSpeed}}Mbps。"
      description: 带宽利用率高
  - alert: 接口错包告警
    expr: (increase(ifInErrors{ifName!~".*(NULL|InLoop|vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])
      and  increase(ifOutErrors{ifName!~".*(NULL|InLoop|vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])  )
      * on(instance) group_left(sysName) sysName > 5000
    for: 0s
    labels:
      severity: 紧急
      value: '{{ printf "%.2f" $value }}'
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 {{ $labels.interface}}接口错包超过5000"
      description: 接口错包告警
  - alert: 接口缓存告警
    expr: (increase(hh3cifPktBufInDrop{ifName!~".*(NULL|InLoop|vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])
      and  increase(hh3cifPktBufEgDrop{ifName!~".*(NULL|InLoop|vlan|Vsi|Loo|NU|SSL).*",ifHighSpeed!~"^(0|-)$"}[5m])  )
      * on(instance) group_left(sysName) sysName  > 3000
    for: 0s
    labels:
      severity: 紧急
      value: '{{ printf "%.2f" $value }}'
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】 {{ $labels.interface}}接口缓存丢包超过5000"
      description: 接口缓存告警
  - alert: QoS红色流量队列溢出(red discard)
    expr: 0.000008 * irate(hh3cCBQoSCarRedBytes_finally[5m]) * on(instance) group_left(sysName)
      sysName > 20
    for: 4m
    labels:
      severity: 紧急
      value: 当前丢弃速率{{ printf "%.2f" $value }}Mbps
    annotations:
      summary: "{{ $labels.sysName }}【{{ $labels.instance }}】 Qos策略:{{ $labels.qoscb
        }} 关联接口:{{ $labels.interface }} 触发红色管道流量强制丢弃"
      description: QoS红色流量队列溢出(red discard)
- name: 设备协议告警
  rules:
  - alert: IRF状态变化
    expr: "(hh3cStackMemberNum != 100 and changes_prometheus(hh3cStackMemberNum[5m])>0
      )   * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】主机IRF成员变化，当前成员数为{{$value}}"
      description: IRF状态变化
  - alert: MLAG状态变化
    expr: "(hh3cMLagRoleLocalEffectiveRole != 100 and changes_prometheus(hh3cMLagRoleLocalEffectiveRole[5m])
      > 0 )   * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName }}【{{ $labels.instance }}】主机MLAG状态变化，当前状态{{ if
        eq (printf "%v" $value) "1" }}Master{{ else }}Standby{{ end }}'
      description: MLAG状态变化
  - alert: BGP状态变化
    expr: "(  sum without (protoversion, fsmtransitions, remoteport, localport, localaddr,
      peerident) (bgppeerstate) != 100  and changes_prometheus(sum without (protoversion,
      fsmtransitions, remoteport, localport, localaddr, peerident) (bgppeerstate)[5m])
      > 0 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName }}【{{ $labels.instance }}】主机BGP Peer【{{ $labels.index
        }}】邻居状态变化，当前状态: {{ if eq (printf "%v" $value) "1" }}idle{{ else if eq (printf
        "%v" $value) "2" }}connect{{ else if eq (printf "%v" $value) "3" }}active{{
        else if eq (printf "%v" $value) "4" }}opensent{{ else if eq (printf "%v" $value)
        "5" }}openconfirm{{ else if eq (printf "%v" $value) "6" }}established{{ else
        }}未知{{ end }}'
      description: BGP状态变化
  - alert: BFD状态变化
    expr: "(hh3cBfdSessState != 100 and changes_prometheus(hh3cBfdSessState[5m]) >
      0 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: '{{ $labels.sysName}}【{{ $labels.instance}}】主机BFD【{{ $labels.hh3cBfdSessLocalAddr}}】邻居状态变化，当前状态：{{
        if eq (printf "%v" $value) "0" }}adminDown{{ else if eq (printf "%v" $value)
        "1" }}down{{ else if eq (printf "%v" $value) "2" }}init{{ else if eq (printf
        "%v" $value) "3" }}up{{ else }}未知{{ end }}'
      description: BFD状态变化
  - alert: NQA状态变化
    expr: "(hh3cNqaStatResLostPacketRatio > 40 and changes_prometheus(hh3cNqaStatResLostPacketRatio[5m])
      > 0 ) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】主机NQA有丢包，任务组{{ $labels.pingCtlOwnerIndex}}，任务名称{{
        $labels.pingCtlTestName}}，当前丢包率{{$value}}%"
      description: '{{ template "nqa_description" . }}'
  - alert: NQA延时过大
    expr: "(min_over_time(hh3cNqaStatResAverageRtt[5m]) - max_over_time(hh3cNqaStatResAverageRtt[5m]
      offset 5m) > 30) * on(instance) group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】主机NQA时延最近5分钟增长超过30ms，任务组{{
        $labels.pingCtlOwnerIndex}}，任务名称{{ $labels.pingCtlTestName}}，当前时延为{{ $value
        }}  ms"
      description: '{{ template "nqa_description" . }}'
  - alert: STP状态变化
    expr: "(stp_root != 100 and changes_prometheus(stp_root[5m]) > 0 ) * on(instance)
      group_left(sysName) sysName"
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName}}【{{ $labels.instance}}】STP状态变化，当前STP实例为：{{ $labels.instance_id}}，STP根桥为：{{
        $labels.stp_root_mac}}"
      description: STP状态变化
  - alert: 设备NTP时间偏移（H3C）
    expr: abs(hh3cNTPSysClockSec - time()) > 600
    for: 2m
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName }}【{{ $labels.instance }}】系统时间与标准UTC时间偏差超过10分钟，当前偏差为
        {{$value}} 秒"
      description: NTP时间偏移
  - alert: 设备NTP时间偏移（HW）
    expr: abs((hwSysLocalClock-28800)-time()) > 600
    for: 2m
    labels:
      severity: 紧急
    annotations:
      summary: "{{ $labels.sysName }}【{{ $labels.instance }}】系统时间与标准UTC时间偏差超过10分钟，当前偏差为
        {{$value}} 秒"
      description: NTP时间偏移
  - alert: 公有云专线BGP接收路由数量超限90%预警
    expr: receive_route_num > bgp_route_limit * 0.9
    for: 0s
    labels:
      severity: 紧急
    annotations:
      summary: |
        **专线名称**: {{ $labels.name }}
        **本地IPv4**: {{ $labels.local_gateway_v4_ip }}
        **BGP AS**: {{ $labels.bgp_asn }}
        **当前路由数**: {{$value}}
        **路由限制**: {{ $labels.bgp_route_limit }}
        **专线ID**: {{ $labels.direct_connect_id }}
      description: 专线路由接收数量接近上限
- name: Merics_Relabel
  rules:
  - record: mtr_avg_short
    expr: sum without (hop, host) (mtr_avg)
  - record: otherPower
    expr: otherPowermell{mellanoxlName="Power Supply"}/3
  - record: otherFan
    expr: otherFanmell{mellanoxlName="Fan Sensor"}
- name: hh3cCBQoSQueueMatchedBytes
  rules:
  - record: hh3cCBQoSQueueMatchedBytes_finally
    expr: |
      label_replace(
        label_replace(
          label_replace(
            label_join(
              label_replace(
                label_join(
                  (((((((
                    hh3cCBQoSQueueMatchedBytes
                    * on (hh3cCBQoSApplyObjectIndex, instance)
                      group_left (hh3cCBQoSApplyObjectMainSite)
                      hh3cCBQoSApplyObjectMainSite
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (ifName)
                      ifName
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (ifAlias)
                      ifAlias
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (hh3cCBQoSIfApplyPolicyName, hh3cCBQoSIfApplyPolicyDirection)
                      hh3cCBQoSIfApplyPolicyName
                  )
                    * on (hh3cCBQoSIfApplyPolicyName, instance)
                      group_left (hh3cCBQoSPolicyIndex)
                      hh3cCBQoSPolicyName
                  )
                    * on (hh3cCBQoSPolicyIndex, hh3cCBQoSPolicyClassIndex, instance)
                      group_left (hh3cCBQoSPolicyClassBehaviorName)
                      hh3cCBQoSPolicyClassBehaviorName
                  )
                    * on (hh3cCBQoSPolicyIndex, hh3cCBQoSPolicyClassIndex, instance)
                      group_left (hh3cCBQoSPolicyClassClassifierName)
                      hh3cCBQoSPolicyClassClassifierName
                  ),
                  "interface", "【", "ifName", "ifAlias"
                ),
                "interface", "$1】", "interface", "(.+)"
              ),
              "qoscb", "【", "hh3cCBQoSPolicyClassClassifierName", "hh3cCBQoSPolicyClassBehaviorName"
            ),
            "qoscb", "$1】", "qoscb", "(.+)"
          ),
          "direction", "out", "hh3cCBQoSIfApplyPolicyDirection", "2"
        ),
        "direction", "in", "hh3cCBQoSIfApplyPolicyDirection", "1"
      )
- name: hh3cCBQoSQueueDiscardedBytes
  rules:
  - record: hh3cCBQoSQueueDiscardedBytes_finally
    expr: |
      label_replace(
        label_replace(
          label_replace(
            label_join(
              label_replace(
                label_join(
                  (((((((
                    hh3cCBQoSQueueDiscardedBytes
                    * on (hh3cCBQoSApplyObjectIndex, instance)
                      group_left (hh3cCBQoSApplyObjectMainSite)
                      hh3cCBQoSApplyObjectMainSite
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (ifName)
                      ifName
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (ifAlias)
                      ifAlias
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (hh3cCBQoSIfApplyPolicyName, hh3cCBQoSIfApplyPolicyDirection)
                      hh3cCBQoSIfApplyPolicyName
                  )
                    * on (hh3cCBQoSIfApplyPolicyName, instance)
                      group_left (hh3cCBQoSPolicyIndex)
                      hh3cCBQoSPolicyName
                  )
                    * on (hh3cCBQoSPolicyIndex, hh3cCBQoSPolicyClassIndex, instance)
                      group_left (hh3cCBQoSPolicyClassBehaviorName)
                      hh3cCBQoSPolicyClassBehaviorName
                  )
                    * on (hh3cCBQoSPolicyIndex, hh3cCBQoSPolicyClassIndex, instance)
                      group_left (hh3cCBQoSPolicyClassClassifierName)
                      hh3cCBQoSPolicyClassClassifierName
                  ),
                  "interface", "【", "ifName", "ifAlias"
                ),
                "interface", "$1】", "interface", "(.+)"
              ),
              "qoscb", "【", "hh3cCBQoSPolicyClassClassifierName", "hh3cCBQoSPolicyClassBehaviorName"
            ),
            "qoscb", "$1】", "qoscb", "(.+)"
          ),
          "direction", "out", "hh3cCBQoSIfApplyPolicyDirection", "2"
        ),
        "direction", "in", "hh3cCBQoSIfApplyPolicyDirection", "1"
      )
- name: hh3cCBQoSAccountingPktbps
  rules:
  - record: hh3cCBQoSAccountingPktbps_finally
    expr: |
      label_replace(
        label_replace(
          label_replace(
            label_join(
              label_replace(
                label_join(
                  (((((((
                    hh3cCBQoSAccountingPktbps
                    * on (hh3cCBQoSApplyObjectIndex, instance)
                      group_left (hh3cCBQoSApplyObjectMainSite)
                      hh3cCBQoSApplyObjectMainSite
                  )
                    * on (hh3cCBQoSApplyObjectMainSite, instance)
                      group_left (ifName)
