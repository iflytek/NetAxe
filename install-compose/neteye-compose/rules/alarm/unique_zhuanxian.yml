      - alert: 教育BG芜湖华为云-职教POP流量预警超90M，总带宽100M
        expr:  max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.22.200',ifName='Ten-GigabitEthernet7/3/3.2004'}[5m]),"direction", "入方向", "", ""),0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.22.200',ifName='Ten-GigabitEthernet7/3/3.2004'}[5m]),"direction", "出方向", "", "")) by (instance, interface, direction)* on(instance) group_left(sysName) sysName > 90
        for: 0s
        labels:
          severity: 紧急
          value: '{{ printf "%.2f" $value }}Mbps'
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】{{ $labels.interface}}接口【{{ $labels.direction}}】流量过大'
          description: '教育芜湖华为云-职教POP流量预警超90M，总带宽100M'

