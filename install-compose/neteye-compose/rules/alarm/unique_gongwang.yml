        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.interface}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网2入方向流量超4G预警，该线路带宽5G，入向总带宽为4*5G合计20G'

      # 合肥B3联通大带宽公网2入方向流量超4G预警
      - alert: 合肥B3联通大带宽公网2入方向流量超4G预警,该线路带宽为5G,总带宽为4*5G
        expr: 0.000008 * irate(ifHCInOctets{instance='10.254.12.252',ifName='Ten-GigabitEthernet1/0/46'}[5m]) * on(instance) group_left(sysName) sysName > 4000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.interface}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网2入方向流量超4G预警，该线路带宽5G，入向总带宽为4*5G合计20G'

      # 合肥B3联通大带宽公网1出方向流量超2.2G预警
      - alert: 合肥B3联通大带宽公网1出方向流量超2.2G预警,该线路带宽2.5G,总带宽4*2.5G
        expr: 0.000008 * irate(ifHCOutOctets{instance='10.254.12.252',ifName='Ten-GigabitEthernet1/0/45'}[5m]) * on(instance) group_left(sysName) sysName > 2200
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.interface}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网1出方向流量超2.2G预警，该线路带宽2.5G，出向总带宽为4*2.5合计10G'

      # 合肥B3联通大带宽公网2出方向流量超2.2G预警
      - alert: 合肥B3联通大带宽公网2出方向流量超2.2G预警,该线路带宽2.5G,总带宽4*2.5G
        expr: 0.000008 * irate(ifHCOutOctets{instance='10.254.12.252',ifName='Ten-GigabitEthernet1/0/46'}[5m]) * on(instance) group_left(sysName) sysName > 2200
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.interface}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网2出方向流量超2.2G预警，该线路带宽2.5G，出向总带宽为4*2.5合计10G'


      # 合肥B3电信公网流量超600M预警
      - alert: 合肥B3电信公网1流量超600M预警
        expr: max(
                0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.10', ifName='Ten-GigabitEthernet1/0/1'}[5m]), "direction", "出方向", "", ""),
                0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.10', ifName='Ten-GigabitEthernet1/0/1'}[5m]), "direction", "入方向", "", "")
              ) by (instance, ifName, direction)
              * on(instance) group_left(sysName) sysName > 600
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.ifName}} - {{ $labels.direction}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3电信公网1流量超600M预警，该线路带宽700M，总带宽为2*700合计1.4G'

      # 合肥B3电信公网流量超600M预警
      - alert: 合肥B3电信公网2流量超600M预警
        expr: max(
                0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.20', ifName='Ten-GigabitEthernet1/0/1'}[5m]), "direction", "出方向", "", ""),
                0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.20', ifName='Ten-GigabitEthernet1/0/1'}[5m]), "direction", "入方向", "", "")
              ) by (instance, ifName, direction)
              * on(instance) group_left(sysName) sysName > 600
        for: 0s
        labels:
