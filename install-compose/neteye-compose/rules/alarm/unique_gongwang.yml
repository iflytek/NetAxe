groups:
  - name: 公网流量预警
    rules:


#########################################  合肥A2  ##########################
      # A2电信线路1流量超600M预警
      - alert: A2电信线路1流量超600M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/9'}[5m]), "direction", "入方向", "", ""), 0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/9'}[5m]), "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName) sysName > 600
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】A2电信线路1流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: 'A2电信线路1流量超600M预警'

      # A2电信线路2流量超600M预警
      - alert: A2电信线路2流量超600M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet2/0/2'}[5m]), "direction", "入方向", "", ""), 0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet2/0/2'}[5m]), "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName) sysName > 600
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】A2电信线路2流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: 'A2电信线路2流量超600M预警'

      # A2移动线路1流量超400M预警
      - alert: A2移动线路1流量超400M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/2'}[5m]), "direction", "入方向", "", ""), 0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/2'}[5m]), "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName) sysName > 400
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】A2移动线路1流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: 'A2移动线路1流量超400M预警'

      # A2移动线路2流量超400M预警
      - alert: A2移动线路2流量超400M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet2/0/1'}[5m]), "direction", "入方向", "", ""), 0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet2/0/1'}[5m]), "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName) sysName > 400
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】A2移动线路2流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: 'A2移动线路2流量超400M预警'

      # A2联通线路2流量超150M预警
      - alert: A2联通线路2流量超150M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/3'}[5m]), "direction", "入方向", "", ""), 0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.21', ifName='Ten-GigabitEthernet1/0/3'}[5m]), "direction", "出方向", "", "")) by (instance, direction) * on(instance) group_left(sysName) sysName > 150
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】A2联通线路2流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: 'A2联通线路2流量超150M预警'

      # 合肥A2电信公网总流量超1.3G阈值
      - alert: 大流量预警:合肥A2电信公网总流量超1.3G阈值
        expr: max(0.000008 * sum(irate(ifHCInOctets{instance='10.254.6.21', ifName=~"Ten-GigabitEthernet1/0/9|Ten-GigabitEthernet2/0/2"}[5m])) by (instance), 0.000008 * sum(irate(ifHCOutOctets{instance='10.254.6.21', ifName=~"Ten-GigabitEthernet1/0/9|Ten-GigabitEthernet2/0/2"}[5m])) by (instance)) * on(instance) group_left(sysName) sysName > 1300
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】合肥A2公网出入口流量超1.3G，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '大流量预警:合肥A2电信公网总流量超1.3G阈值'

#########################################  合肥A2教育网流量预警  ###############################

      # 合肥A2教育电信公网流量超500M预警
      - alert: 合肥A2教育电信公网流量超500M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/12'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/12'}[5m]), "direction", "出方向", "", ""))
              by (instance, direction) * on(instance) group_left(sysName) sysName > 500
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥A2教育电信公网流量超500M预警'

      # 合肥A2教育移动公网流量超250M预警
      - alert: 合肥A2教育移动公网流量超250M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/39'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/39'}[5m]), "direction", "出方向", "", ""))
              by (instance, direction) * on(instance) group_left(sysName) sysName > 250
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥A2教育移动公网流量超250M预警'

      # 合肥A2教育联通公网流量超250M预警
      - alert: 合肥A2教育联通公网流量超250M预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/30'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.6.22', ifName='GigabitEthernet1/0/30'}[5m]), "direction", "出方向", "", ""))
              by (instance, direction) * on(instance) group_left(sysName) sysName > 250
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥A2教育联通公网流量超250M预警'

#########################################  合肥B3公网流量预警  ###############################

      # 合肥B3科华BGP公网1流量超5G预警
      - alert: 合肥B3科华BGP公网1流量超5G预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.251', ifName='FortyGigE1/0/49'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.251', ifName='FortyGigE1/0/49'}[5m]), "direction", "出方向", "", ""))
              by (instance, direction) * on(instance) group_left(sysName) sysName > 5000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3科华BGP公网1流量超5G预警，总带宽10G_B3.WAN.IN.DS.X00s1_FGE1/0/49'

      # 合肥B3科华BGP公网2流量超5G预警
      - alert: 合肥B3科华BGP公网2流量超5G预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.251', ifName='FortyGigE1/0/50'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.251', ifName='FortyGigE1/0/50'}[5m]), "direction", "出方向", "", ""))
              by (instance, direction) * on(instance) group_left(sysName) sysName > 5000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.direction}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3科华BGP公网2流量超5G预警，总带宽10G_B3.WAN.IN.DS.X00s1_FGE1/0/50'

      # 合肥B3联通大带宽公网1入方向流量超4G预警
      - alert: 合肥B3联通大带宽公网1入方向流量超4G预警,该线路带宽为5G,总带宽为4*5G
        expr: 0.000008 * irate(ifHCInOctets{instance='10.254.12.251', ifName='Ten-GigabitEthernet1/0/45'}[5m]) * on(instance) group_left(sysName) sysName > 4000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口入方向流量过大，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网1入方向流量超4G预警，该线路带宽5G，联通大带宽入向总带宽为4*5G合计20G_B3.WAN.IN.DS.X01M1_XGE1/0/45'


      # 合肥B3联通大带宽流量预警

      # 合肥B3联通大带宽公网2入方向流量超4G预警
      - alert: 合肥B3联通大带宽公网2入方向流量超4G预警,该线路带宽为5G,总带宽为4*5G
        expr: 0.000008 * irate(ifHCInOctets{instance='10.254.12.251', ifName='Ten-GigabitEthernet1/0/46'}[5m]) * on(instance) group_left(sysName) sysName > 4000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口入方向，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网2入方向流量超4G预警，该线路带宽5G，入向总带宽为4*5合计20G'

      # 合肥B3联通大带宽公网1出方向流量超2.2G预警
      - alert: 合肥B3联通大带宽公网1出方向流量超2.2G预警,该线路带宽为2.5G，总带宽为4*2.5G
        expr: 0.000008 * irate(ifHCOutOctets{instance='10.254.12.251', ifName='Ten-GigabitEthernet1/0/45'}[5m]) * on(instance) group_left(sysName) sysName > 2200
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口出方向，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网1出方向流量超2.2G预警，该线路带宽2.5G，出向总带宽为4*2.5G合计10G'

      # 合肥B3联通大带宽公网2出方向流量超2.2G预警
      - alert: 合肥B3联通大带宽公网2出方向流量超2.2G预警,该线路带宽为2.5G，总带宽为4*2.5G
        expr: 0.000008 * irate(ifHCOutOctets{instance='10.254.12.251', ifName='Ten-GigabitEthernet1/0/46'}[5m]) * on(instance) group_left(sysName) sysName > 2200
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口出方向，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3联通大带宽公网2出方向流量超2.2G预警，该线路带宽2.5G，出向总带宽为4*2.5合计10G'


      # 合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34) 描述:合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34)
     # - alert: 合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34) 描述:合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34)
     #   expr: 0.000008 * irate(ifHCOutOctets{instance='10.254.12.251', ifName='Ten-GigabitEthernet1/0/34'}[5m]) * on(instance) group_left(sysName) sysName > 2900
     #   for: 0s
     #   labels:
     #     severity: 紧急
     #     time_stamp: current_time_seconds
     #     value: '{{ printf "%.2f" $value }}Mbps'
     #   annotations:
     #     summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口出方向，当前流量为{{ printf "%.2f" $value }}Mbps'
     #     description: '合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34) 描述:合肥B3_联通3G固定带宽流量超2.9G预警(总带宽:3G，VLAN:34)'

      # 合肥B3科华BGP公网流量预警

      # 合肥B3科华BGP公网1流量超5G预警
      - alert: 合肥B3科华BGP公网1流量超5G预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.252', ifName='FortyGigE1/0/49'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.252', ifName='FortyGigE1/0/49'}[5m]), "direction", "出方向", "", ""))
              by (instance, ifName, direction) * on(instance) group_left(sysName) sysName > 5000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.ifName}} - {{ $labels.direction}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3科华BGP公网1流量超5G预警，总带宽10G'

      # 合肥B3科华BGP公网2流量超5G预警
      - alert: 合肥B3科华BGP公网2流量超5G预警
        expr: max(0.000008 * label_replace(irate(ifHCInOctets{instance='10.254.12.252', ifName='FortyGigE1/0/50'}[5m]), "direction", "入方向", "", ""),
                  0.000008 * label_replace(irate(ifHCOutOctets{instance='10.254.12.252', ifName='FortyGigE1/0/50'}[5m]), "direction", "出方向", "", ""))
              by (instance, ifName, direction) * on(instance) group_left(sysName) sysName > 5000
        for: 0s
        labels:
          severity: 紧急
        annotations:
          summary: '{{ $labels.sysName}}【{{ $labels.instance}}】接口【{{ $labels.ifName}} - {{ $labels.direction}}】，当前流量为{{ printf "%.2f" $value }}Mbps'
          description: '合肥B3科华BGP公网2流量超5G预警，总带宽10G'



      # 合肥B3联通大带宽公网2入方向流量超4G预警
      - alert: 合肥B3联通大带宽公网2入方向流量超4G预警,该线路带宽为5G,总带宽为4*5G
        expr: 0.000008 * irate(ifHCInOctets{instance='10.254.12.252',ifName='Ten-GigabitEthernet1/0/45'}[5m]) * on(instance) group_left(sysName) sysName > 4000
